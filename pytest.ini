[pytest]
minversion = 7.0
testpaths = testcases
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# allure generate reports/allure-results -o reports/allure-report --clean
# allure open reports/allure-report  -------Allure生成测试报告并自动打开    ctrl+c终止
addopts =
    -v
    --tb=short
    --strict-markers
    --alluredir=reports/allure-results
    -p no:cacheprovider

markers =
    smoke: 冒烟测试 — 核心关键路径
    regression: 回归测试 — 完整功能验证
    login: 登录模块相关测试
    user_management: 用户管理模块相关测试
    role_management: 角色管理模块相关测试
    menu_management: 菜单管理模块相关测试
    dept_management: 部门管理模块相关测试
    slow: 执行较慢的测试